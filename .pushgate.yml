# =============================================================================
# Pushgate v2 configuration - full reference
# https://github.com/rootstrap/ai-pushgate
# =============================================================================
# Commit .pushgate.yml so the team shares review settings.
#
# To install or update Pushgate:
#   curl -fsSL https://raw.githubusercontent.com/rootstrap/ai-pushgate/main/install.sh | bash
#
# Reinstall with a pre-built template when useful:
#   curl -fsSL https://raw.githubusercontent.com/rootstrap/ai-pushgate/main/install.sh | bash -s -- --template node
#   curl -fsSL https://raw.githubusercontent.com/rootstrap/ai-pushgate/main/install.sh | bash -s -- --template typescript
#   curl -fsSL https://raw.githubusercontent.com/rootstrap/ai-pushgate/main/install.sh | bash -s -- --template nextjs
#   curl -fsSL https://raw.githubusercontent.com/rootstrap/ai-pushgate/main/install.sh | bash -s -- --template ruby
#   curl -fsSL https://raw.githubusercontent.com/rootstrap/ai-pushgate/main/install.sh | bash -s -- --template rails
# =============================================================================

version: 2

ai:
  # Supported modes: blocking, advisory, off.
  mode: advisory

  # Changed-line overages block the push; prompt-token overages skip local AI.
  max_changed_lines: 500
  max_prompt_tokens: 12000
  timeout_seconds: 120

  # Blocking and advisory modes select a provider and define its matching block.
  provider: claude
  providers:
    # Provider-specific settings are kept below the provider name.
    claude:
      model: claude-sonnet-4-20250514
    # To use the standalone GitHub Copilot CLI, set provider: copilot and
    # uncomment this block. Omit model to let Copilot choose its default.
    # copilot:
    #   model: auto

review:
  # Branch to diff against when collecting changes.
  target_branch: master

  # Lines of surrounding context included in the diff sent to the provider.
  context_lines: 10

  # Below this changed-line threshold, later AI work can send full file context.
  max_lines_for_full_file: 300

# =============================================================================
# Tools
# =============================================================================
# Tools run before AI review. Each command is an argv array, not a shell string.
# A {changed_files} token expands to individual argv entries without shell
# interpolation, so filenames with spaces stay one argument.
#
# Tool defaults:
#   timeout_seconds: 60
#   mode: blocking       # blocking | warning; warnings require confirmation
#   run: changed_files   # changed_files | always
#   fail_fast: true
#
# Examples (uncomment and adapt as needed):
#
# tools:
#   - name: eslint
#     command: ["npx", "eslint", "{changed_files}"]
#     extensions: [".js", ".jsx", ".ts", ".tsx", ".mjs"]
#     timeout_seconds: 60
#     mode: blocking
#     run: changed_files
#     fail_fast: true
#
#   - name: prettier
#     command: ["npx", "prettier", "--check", "{changed_files}"]
#     extensions: [".js", ".jsx", ".ts", ".tsx", ".mjs", ".json", ".css", ".md"]
#
#   - name: rubocop
#     command: ["bundle", "exec", "rubocop", "{changed_files}"]
#     extensions: [".rb", ".rake", ".gemspec"]
#
#   - name: brakeman
#     command: ["bundle", "exec", "brakeman", "--no-pager"]
#     run: always
#
#   - name: pytest
#     command: ["pytest", "--tb=short"]
#     extensions: [".py"]
#
tools:
  - name: type-check
    command: ["pnpm", "run", "type-check"]
    run: always
    timeout_seconds: 120
    mode: blocking
    fail_fast: true

  - name: lint
    command: ["pnpm", "run", "lint"]
    run: always
    timeout_seconds: 120
    mode: blocking
    fail_fast: true

  - name: lint-translations
    command: ["pnpm", "run", "lint:translations"]
    run: always
    timeout_seconds: 120
    mode: blocking
    fail_fast: true

# =============================================================================
# Built-in deterministic policies
# =============================================================================
# Built-ins are opt-in local checks that do not require external tools.
#
# Policy defaults:
#   mode: blocking       # blocking | warning; warnings require confirmation
#
# Examples (uncomment and adapt as needed):
#
# policies:
#   diff_size:
#     max_changed_lines: 500
#     mode: warning      # asks before continuing
#     fail_fast: false   # if blocking, continue later checks after a violation
#
#   forbidden_paths:
#     patterns:
#       - ".env"
#       - ".env.*"
#       - "secrets/**"
#       - "*.pem"
#     mode: blocking
#     fail_fast: true
#
policies:
  diff_size:
    max_changed_lines: 500
    mode: warning
    fail_fast: false

  forbidden_paths:
    patterns:
      - ".env"
      - ".env.*"
      - "secrets/**"
      - "*.pem"
    mode: blocking
    fail_fast: true

# =============================================================================
# Plugins
# =============================================================================
# Plugin adapters run external scanners through a first-class Pushgate result
# model. They run after built-in policies and before generic tools.
#
# Gitleaks scans the branch commit range for secrets before push. Install it
# separately (for example, brew install gitleaks) and tune rules with
# .gitleaks.toml, .gitleaksignore, or a baseline report.
#
# plugins:
#   gitleaks:
#     enabled: true
#     command: gitleaks
#     timeout_seconds: 60
#     mode: blocking
#     fail_fast: true
#     config_path: .gitleaks.toml
#     baseline_path: .gitleaks/baseline.json
#     gitleaks_ignore_path: .gitleaksignore
#
plugins: {}

# =============================================================================
# Ignore paths
# =============================================================================
# Files and patterns excluded from tool checks and AI review.
ignore_paths:
  - "*.lock"
  - "package-lock.json"
  - "pnpm-lock.yaml"
  - "yarn.lock"
  - "Gemfile.lock"
  - "dist/**"
  - "build/**"
  - ".next/**"
  - "coverage/**"
  - "tmp/**"
  - "log/**"
